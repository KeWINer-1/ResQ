<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>resq - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="src/favicon.ico" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <a class="brand" href="index.html">
        <img src="src/logo.png" alt="resq logo" />
      </a>
      <nav class="nav-links">
        <a href="index.html">Kezdolap</a>
        <a href="admin.html">Admin</a>
        <a href="auth.html" data-auth-link>Belepes</a>
      </nav>
    </header>

    <section class="section">
      <div class="map-layout" style="grid-template-columns: minmax(260px, 360px) 1fr;">
        <aside class="sidebar">
          <h2>Beszelgetesek</h2>
          <p class="notice" id="admin-message"></p>
          <div id="admin-conversations"></div>
        </aside>
        <div class="card" style="padding: 16px;">
          <h3 id="admin-convo-title">Valassz beszelgetest</h3>
          <div class="chat-box" id="admin-messages"></div>
          <div class="split" style="grid-template-columns: 1fr auto; margin-top: 12px;">
            <div>
              <input id="admin-input" type="text" placeholder="Uzenet..." />
            </div>
            <div>
              <button class="btn" id="admin-send" type="button">Kuldes</button>
            </div>
          </div>
          <div class="cta-row" style="margin-top: 12px;">
            <button class="btn secondary" id="admin-close" type="button">
              Beszelgetes lezarasa es torlese
            </button>
          </div>
        </div>
      </div>
    </section>

    <script src="js/common.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
