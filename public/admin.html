<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>resq - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="src/favicon.ico" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="app-theme">
    <header>
      <a class="brand" href="map.html">
        <img src="src/logo.png" alt="resq logo" />
      </a>
      <button class="nav-toggle" type="button" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links">
        <a href="rolunk.html">Rólunk</a>
        <a href="admin.html">Segítségkérések</a>
        <a href="auth.html" data-auth-link>Belépés</a>
      </nav>
    </header>

    <section class="section">
      <div class="map-layout" style="grid-template-columns: minmax(260px, 360px) 1fr;">
        <aside class="sidebar">
          <h2>Segítségkérések</h2>
          <p class="notice" id="admin-message"></p>
          <div id="admin-filters" class="conversation-filters"></div>
          <div id="admin-conversations"></div>
        </aside>
        <div class="card" style="padding: 16px;">
          <h3 id="admin-convo-title">Válassz beszélgetést</h3>
          <div id="admin-chat-panel" style="display: none;">
            <div class="chat-box" id="admin-messages"></div>
            <div class="split" style="grid-template-columns: 1fr auto; margin-top: 12px;">
              <div>
                <input id="admin-input" type="text" placeholder="Üzenet..." />
              </div>
              <div>
                <button class="btn" id="admin-send" type="button">Kuldes</button>
              </div>
            </div>
            <div class="cta-row" style="margin-top: 12px;">
              <button class="btn secondary" id="admin-close" type="button">
                Beszélgetés lezárása és törlése
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="js/common.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
