<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>resq - Értékelések</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="src/favicon.ico" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="app-theme">
    <header>
      <a class="brand" href="map.html">
        <img src="src/logo.png" alt="resq logo" />
      </a>
      <button class="nav-toggle" type="button" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links">
        <a href="map.html">Térkép</a>
        <a href="automento.html" data-provider-link>Autómentő mód</a>
        <a href="support.html" data-support-link>Ügyfélszolgálat</a>
        <a href="rolunk.html">Rólunk</a>
        <a href="auth.html" data-auth-link>Belépés</a>
      </nav>
    </header>

    <main class="section">
      <div class="form-card" style="max-width: 900px;">
      <h2>Értékelések</h2>
        <p class="notice" id="ratings-message"></p>

        <div class="card ratings-summary" id="ratings-summary" style="margin-top: 8px;">
          <div>
            <div class="notice">Atlag</div>
            <div class="avg-stars-row">
              <div class="avg-stars" aria-hidden="true">
                <span class="avg-stars-base">★★★★★</span>
                <span class="avg-stars-fill" id="avg-stars-fill">★★★★★</span>
              </div>
              <span class="avg-stars-value" id="avg-stars-value">-</span>
            </div>
          </div>
          <div>
          <div class="notice">Összes értékelés</div>
            <div class="ratings-count" id="ratings-count">0 db</div>
          </div>
        </div>

        <div id="ratings-list" class="ratings-list" style="margin-top: 14px;"></div>
      </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/ertekelesek.js"></script>
  </body>
</html>
